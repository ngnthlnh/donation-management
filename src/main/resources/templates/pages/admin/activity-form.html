<!doctype html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/admin/admin-layout}"
>
<head>
    <title>Admin Dashboard</title>
    <style>
        .ck-editor {
            height: 100% !important;
            display: flex;
            flex-direction: column;
        }

        .ck-editor__main {
            flex: 1 !important;
            display: flex !important;
            flex-direction: column !important;
            overflow: hidden !important;
        }

        .ck-content.ck-editor__editable {
            flex: 1 !important;
            overflow-y: auto !important;
            min-height: 0 !important; /* Quan trọng để flex-grow hoạt động */
            border: 1px solid #cbd5e1 !important; /* Màu slate-300 */
        }

        .ck.ck-editor__top .ck-sticky-panel .ck-toolbar {
            border-bottom: 1px solid #cbd5e1 !important;
            border-radius: 8px 8px 0 0 !important;
        }
    </style>
</head>
<body>
<div layout:fragment="content" class="flex-1 flex flex-col h-screen overflow-hidden">
    <!-- Top Header -->
    <header class="h-16 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-8 shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-slate-400">Hoạt động</span>
            <span class="material-icons text-sm text-slate-400">chevron_right</span>
            <span class="font-semibold text-slate-700 dark:text-slate-200">Tạo hoạt động mới</span>
        </div>
        <div class="flex items-center gap-4">
            <a th:href="@{/admin/activities}"
               class="px-4 py-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors font-medium">
                Hủy bỏ
            </a>
            <button id="saveBtn"
                    class="px-6 py-2 bg-primary text-slate-900 font-semibold rounded-lg hover:shadow-lg hover:shadow-primary/20 transition-all flex items-center gap-2">
                <span class="material-icons text-sm font-bold">save</span>
                Lưu hoạt động
            </button>
        </div>
    </header>
    <!-- Scrollable Content -->
    <div class="flex-1 overflow-y-auto p-8">
        <div class="max-w-6xl mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Main Form Area -->
                <div class="lg:col-span-2 space-y-8">
                    <!-- Information Section -->
                    <section
                            class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 p-6">
                        <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                            <span class="material-icons text-primary">info</span>
                            Thông tin cơ bản
                        </h2>
                        <div class="space-y-6">
                            <input type="hidden" id="activityId" th:value="${activity?.id}">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Sự
                                    kiện cha (bắt buộc)</label>
                                <select id="activityEvent"
                                        class="border p-2 w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-primary focus:border-primary">
                                    <option value="">-- Chọn sự kiện --</option>
                                    <option th:each="e : ${events.data}"
                                            th:value="${e.id}"
                                            th:text="${e.name}"
                                            th:selected="${activity.eventId != null and activity.eventId == e.id}">
                                    </option>
                                </select>
                            </div>
                            <div class="grid grid-cols-1">
                                <div class="md:col-span-1">
                                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Tên
                                        hoạt động</label>
                                    <input id="activityName"
                                           th:value="${activity.name}"
                                           class="p-2 w-full rounded-lg border border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-primary focus:border-primary"
                                           placeholder="Ví dụ: Xây trường cho em tại Hà Giang" type="text"/>
                                </div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="md:col-span-1">
                                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Địa
                                        điểm hoạt động</label>
                                    <input id="activityLocation"
                                           th:value="${activity?.location}"
                                           class="p-2 w-full rounded-lg border border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-primary focus:border-primary"
                                           placeholder="Lê Duẫn, Đà Nẵng,..." type="text"/>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Mô tả
                                    ngắn</label>
                                <textarea id="activityShortDescription"
                                          th:text="${activity.shortDescription}"
                                          class="border p-2 w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-primary focus:border-primary"
                                          placeholder="Tóm tắt ngắn gọn về mục tiêu và ý nghĩa của hoạt động..."
                                          rows="2"></textarea>
                            </div>
                        </div>
                    </section>
                    <!-- Rich Text Editor Section -->
                    <section
                            class="bg-surface-light dark:bg-surface-dark rounded-xl shadow-sm border border-slate-100 dark:border-slate-800 p-6 flex flex-col h-auto">
                        <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-5 flex items-center gap-2">
                            <span class="material-symbols-outlined text-primary-dark dark:text-primary">article</span>
                            Nội dung chi tiết
                        </h3>
                        <div id="editor" th:utext="${activity.content}"
                             class="h-full w-full flex-1 border border-slate-200 dark:border-slate-700 rounded-lg overflow-y-auto overflow-x-scroll flex flex-col bg-white dark:bg-slate-800">
                        </div>
                    </section>
                    <!-- Financial Section -->
                    <section
                            class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 p-6">
                        <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                            <span class="material-icons text-primary">payments</span>
                            Thông tin tài chính
                        </h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Mục
                                    tiêu gây quỹ (VNĐ)</label>
                                <div class="relative">
                                    <input id="activityTargetAmount"
                                           th:value="${#numbers.formatDecimal(activity?.targetAmount, 0, 'COMMA', 0, 'POINT')}"
                                           class="p-2 w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-primary focus:border-primary pl-4 pr-12"
                                           th:placeholder="${#numbers.formatDecimal(activity?.targetAmount, 0, 'COMMA', 0, 'POINT')}"
                                           type="number"/>
                                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium text-sm">VNĐ</span>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Đã
                                    đạt được (VNĐ)</label>
                                <div class="relative">
                                    <input id="activityCurrentAmount"
                                           th:value="${#numbers.formatDecimal(activity?.currentAmount, 0, 'COMMA', 0, 'POINT')}"
                                           class="p-2 w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-primary focus:border-primary pl-4 pr-12"
                                           th:placeholder="${#numbers.formatDecimal(activity?.currentAmount, 0, 'COMMA', 0, 'POINT')}"
                                           type="number"/>
                                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium text-sm">VNĐ</span>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
                <!-- Side Content Area -->
                <div class="space-y-8">
                    <!-- Status & Settings -->
                    <section
                            class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 p-6">
                        <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                            <span class="material-icons text-primary">settings</span>
                            Trạng thái &amp; Phân loại
                        </h2>
                        <div class="space-y-6">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Trạng
                                    thái</label>
                                <select id="activityStatus"
                                        class="border p-2 w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-primary focus:border-primary">
                                    <option th:each="status : ${statuses}"
                                            th:value="${status}"
                                            th:text="${status.value}"
                                            th:selected="${status == activity?.status}">
                                    </option>
                                </select>
                            </div>
                        </div>
                    </section>
                    <!-- Date Range -->
                    <section
                            class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 p-6">
                        <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                            <span class="material-icons text-primary">calendar_today</span>
                            Thời gian triển khai
                        </h2>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Ngày
                                    bắt đầu</label>
                                <div class="relative">
                                    <input id="activityStartDate"
                                           th:value="${activity.startDate}"
                                           class="p-1 border w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-primary focus:border-primary"
                                           type="date"/>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Ngày
                                    kết thúc</label>
                                <div class="relative">
                                    <input id="activityEndDate"
                                           th:value="${activity.endDate}"
                                           class="p-1 border w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-primary focus:border-primary"
                                           type="date"/>
                                </div>
                            </div>
                        </div>
                    </section>
                    <!-- Thumbnail Upload Card -->
                    <div class="bg-surface-light dark:bg-surface-dark rounded-xl shadow-sm border border-slate-100 dark:border-slate-800 p-6">
                        <h3 class="text-base font-bold text-slate-900 dark:text-white mb-4">Ảnh đại diện</h3>

                        <div onclick="document.getElementById('thumbnailInput').click()"
                             class="w-full aspect-video rounded-lg border-2 border-dashed border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-800 flex flex-col items-center justify-center cursor-pointer hover:border-primary hover:bg-slate-100 dark:hover:bg-slate-700 transition-all group overflow-hidden relative">

                            <div id="thumbnailPreview"
                                 th:if="${activity?.thumbnailUrl != null}"
                                 th:style="|background-image:url('${activity.thumbnailUrl}')|"
                                 class="absolute inset-0 bg-center bg-cover transition-opacity group-hover:opacity-40">
                            </div>

                            <div id="uploadInstruction"
                                 th:class="${activity?.thumbnailUrl != null} ? 'z-10 flex flex-col items-center text-center p-4 transition-opacity opacity-0 group-hover:opacity-100' : 'z-10 flex flex-col items-center text-center p-4 transition-opacity'">
                                <span class="material-symbols-outlined text-4xl text-slate-400 group-hover:text-primary mb-2">add_photo_alternate</span>
                                <span class="text-sm font-medium text-slate-600 dark:text-slate-300">Tải ảnh lên</span>
                                <span class="text-xs text-slate-400 mt-1">PNG, JPG, GIF tối đa 5MB</span>
                            </div>

                            <input id="thumbnailInput" class="hidden" type="file" accept="image/*"
                                   onchange="previewThumbnail(this)"/>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<th:block layout:fragment="scripts">
    <script type="module">
        import {activityApi} from "/js/apis/activityApi.js";

        let myEditor;
        let currentThumbnailUrl = document.getElementById('thumbnailPreview').style.backgroundImage
            .slice(5, -2).replace(/["']/g, "") || "";

        console.log(currentThumbnailUrl);

        // 1. Khởi tạo CKEditor
        ClassicEditor
            .create(document.querySelector('#editor'), {
                toolbar: [
                    'heading', '|',
                    'bold', 'italic', 'link', '|',
                    'bulletedList', 'numberedList', '|',
                    'insertTable', 'imageUpload', 'mediaEmbed', '|',
                    'undo', 'redo'
                ],
                placeholder: 'Hãy viết câu chuyện truyền cảm hứng cho chiến dịch của bạn...'
            })
            .then(editor => {
                myEditor = editor; // Gán instance vào biến global của module
            })
            .catch(error => console.error(error));

        window.previewThumbnail = async function (input) {
            const preview = document.getElementById('thumbnailPreview');
            const instruction = document.getElementById('uploadInstruction');
            const activityId = document.getElementById('activityId')?.value;

            if (input.files && input.files[0]) {
                const file = input.files[0];

                // Kiểm tra dung lượng
                if (file.size > 5 * 1024 * 1024) {
                    alert("File quá lớn! Vui lòng chọn ảnh dưới 5MB.");
                    return;
                }

                const reader = new FileReader();

                reader.onload = (e) => {
                    preview.style.backgroundImage = `url('${e.target.result}')`;
                    preview.classList.remove('hidden');
                    if (instruction) {
                        instruction.classList.add('opacity-0');
                        instruction.classList.add('group-hover:opacity-100');
                    }
                };
                reader.readAsDataURL(file);

                try {
                    const response = await activityApi.uploadThumbnail(file, activityId || null);

                    if (response.status === 201 || response.status === 200) {
                        currentThumbnailUrl = response.data;
                        console.log("Ảnh đã lưu tại Server:", currentThumbnailUrl);
                    } else {
                        alert("Server báo lỗi: " + response.message);
                    }
                } catch (error) {
                    console.error("Lỗi upload ảnh:", error);
                    alert("Không thể kết nối máy chủ để upload ảnh!");
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const saveBtn = document.getElementById('saveBtn');

            saveBtn.addEventListener('click', async () => {
                const editorData = myEditor ? myEditor.getData() : "";
                // 1. Thu thập dữ liệu từ Form
                const payload = {
                    id: document.getElementById('activityId')?.value || null, // Nếu là edit sẽ có ID
                    eventId: document.getElementById('activityEvent').value,
                    name: document.getElementById('activityName').value,
                    shortDescription: document.getElementById('activityShortDescription').value,
                    content: editorData,
                    status: document.getElementById('activityStatus').value,
                    startDate: document.getElementById('activityStartDate').value,
                    endDate: document.getElementById('activityEndDate').value,
                    targetAmount: document.getElementById('activityTargetAmount').value,
                    currentAmount: document.getElementById('activityCurrentAmount').value,
                    thumbnailUrl: currentThumbnailUrl
                };

                // 2. Validate cơ bản phía Client
                if (!payload.eventId) {
                    alert("Vui lòng chọn sự kiện cha!");
                    return;
                }
                if (!payload.name.trim()) {
                    alert("Tên hoạt động không được để trống!");
                    return;
                }

                // 3. Hiệu ứng loading cho nút
                const originalBtnContent = saveBtn.innerHTML;
                saveBtn.disabled = true;
                saveBtn.innerHTML = `<span class="material-icons animate-spin text-sm">sync</span> Đang lưu...`;

                try {
                    // 4. Gọi API
                    const response = await activityApi.saveActivity(payload);

                    if (response.status === 200) {
                        alert("Lưu hoạt động thành công!");
                        // Chuyển hướng về trang danh sách
                        // window.location.href = '/admin/activities';
                    }
                } catch (error) {
                    console.error("Error saving activity:", error);
                    // Hiển thị lỗi từ Backend (nếu có validation error)
                    const errorMsg = error.response?.data?.message || "Có lỗi xảy ra khi lưu dữ liệu.";
                    alert("Lỗi: " + errorMsg);
                } finally {
                    // 5. Khôi phục trạng thái nút
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = originalBtnContent;
                }
            });
        });
    </script>
</th:block>
</body>
</html>
