<!doctype html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/admin/admin-layout}"
>
<head>
    <title>Admin Dashboard</title>
</head>
<body>
<div layout:fragment="content">
    <!-- Header -->
    <header class="h-16 px-8 py-4 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between shrink-0">
        <h2 class="text-xl font-bold text-slate-900 dark:text-white tracking-tight">Quản lý Nhà hảo tâm</h2>
        <div class="flex items-center gap-4">
            <button class="p-2 text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 relative">
                <span class="material-symbols-outlined">notifications</span>
                <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
            </button>
            <div class="h-8 w-8 rounded-full bg-slate-200 dark:bg-slate-700 overflow-hidden">
                <img alt="Admin Avatar" class="w-full h-full object-cover" data-alt="Profile picture of a smiling man"
                     src="https://lh3.googleusercontent.com/aida-public/AB6AXuANDl8Wqn990MoHVmdpuqseyPoZU_wudqVFgfPMAxW9KGALC0EKnQCT5l7JhOFSB3iqmr6FjIeuxqf4kA2kb9A_WSTNt5c-2PubulhQDzLqOzMMEtIW9Hz_OWAf09CuHCLQC1F4lHd2wZPOUkh9_tk9kG0YBhZ_hu0ERG8ffjk_4tDrnJJi8sVVGIKNnGRNY3f7TMVmvpV7uWNjU9BqfPuoRVGs1HdOvdRrhrLb6ow05_iUbGCG1itnVP7I3fA8zIMK3WBtJvOQovk"/>
            </div>
        </div>
    </header>
    <!-- Content Body -->
    <div class="flex-1 overflow-y-auto p-8">
        <div class="max-w-[1400px] mx-auto space-y-6">
            <!-- Action Bar & Filters -->
            <div class="bg-white dark:bg-slate-900 p-5 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm flex flex-col lg:flex-row gap-4 justify-between items-start lg:items-center">
                <div class="flex flex-col sm:flex-row gap-3 w-full lg:w-auto flex-1">
                    <!-- Search -->
                    <div class="relative w-full sm:w-80 group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors">search</span>
                        </div>
                        <input class="block w-full pl-10 pr-3 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg leading-5 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-shadow"
                               placeholder="Họ tên, Số điện thoại..." type="text" value=""/>
                    </div>
                    <!-- Filters -->
                    <div class="flex gap-3">
                        <div class="relative group">
                            <select class="appearance-none bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 py-2.5 pl-4 pr-10 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors min-w-[140px]">
                                <option>Loại: Tất cả</option>
                                <option>Cá nhân</option>
                                <option>Tổ chức</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-slate-500">
                                <span class="material-symbols-outlined text-sm">expand_more</span>
                            </div>
                        </div>
                        <div class="relative group">
                            <select class="appearance-none bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 py-2.5 pl-4 pr-10 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors min-w-[180px]">
                                <option>Nguồn: Tất cả</option>
                                <option>Facebook</option>
                                <option>Website</option>
                                <option>Sự kiện</option>
                                <option>Giới thiệu</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-slate-500">
                                <span class="material-symbols-outlined text-sm">expand_more</span>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Add Button -->
                <a th:href="@{/admin/donors/form}"
                   class="bg-primary hover:bg-green-400 text-slate-900 font-semibold py-2.5 px-5 rounded-lg shadow-sm shadow-green-200 dark:shadow-none flex items-center gap-2 transition-all active:scale-95 shrink-0 w-full sm:w-auto justify-center">
                    <span class="material-symbols-outlined text-[20px]">add</span>
                    <span>Thêm Nhà hảo tâm</span>
                </a>
            </div>
            <!-- Data Table -->
            <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden flex flex-col">
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="min-w-full divide-y divide-slate-200 dark:divide-slate-800">
                        <thead class="bg-slate-50 dark:bg-slate-800">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider"
                                scope="col">
                                Tên nhà hảo tâm
                            </th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider"
                                scope="col">
                                Loại
                            </th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider"
                                scope="col">
                                Thông tin liên hệ
                            </th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider"
                                scope="col">
                                Ngày tham gia
                            </th>
                            <th class="px-6 py-4 text-center text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider"
                                scope="col">
                                Số lần đóng góp
                            </th>
                            <th class="px-6 py-4 text-right text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider"
                                scope="col">
                                Tổng tiền
                            </th>
                            <th class="px-6 py-4 text-center text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider sticky right-0 bg-slate-50 dark:bg-slate-800 shadow-[-10px_0_15px_-10px_rgba(0,0,0,0.1)] dark:shadow-[-10px_0_15px_-10px_rgba(0,0,0,0.5)]"
                                scope="col">
                                Hành động
                            </th>
                        </tr>
                        </thead>
                        <tbody id="donorTableBody"
                               class="bg-white dark:bg-slate-900 divide-y divide-slate-200 dark:divide-slate-800">
                        </tbody>
                    </table>
                </div>
                <!-- Pagination -->
                <div id="paginationContainer"></div>
            </div>
        </div>
    </div>
</div>
<th:block layout:fragment="scripts">
    <script type="module" th:src="@{/js/pages/admin/donorList.js}"></script>
</th:block>
</body>
</html>
