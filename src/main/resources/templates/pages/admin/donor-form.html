<!doctype html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/admin/admin-layout}"
>
<head>
    <title>Thêm Nhà hảo tâm</title>
</head>
<body>
<div layout:fragment="content">
    <header class="h-16 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-8 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-slate-400">chevron_right</span>
            <h2 class="text-lg font-semibold">Thêm Nhà hảo tâm mới</h2>
        </div>
        <div class="flex items-center gap-4">
            <button class="p-2 text-slate-400 hover:text-primary transition-colors" type="button">
                <span class="material-symbols-outlined">notifications</span>
            </button>
            <div class="h-8 w-[1px] bg-slate-200 dark:bg-slate-800"></div>
            <button id="saveDonorHeaderBtn" type="button"
                    class="flex items-center gap-2 bg-primary px-4 py-2 rounded-lg text-slate-900 font-bold text-sm hover:brightness-105 transition-all">
                <span class="material-symbols-outlined text-[20px]">save</span>
                Lưu thông tin
            </button>
        </div>
    </header>

    <div class="flex-1 overflow-y-auto p-8">
        <div class="max-w-4xl mx-auto">
            <div class="mb-8">
                <h3 class="text-2xl font-bold mb-2">Thông tin Nhà hảo tâm</h3>
                <p class="text-slate-500 dark:text-slate-400">Vui lòng chọn loại hình và điền đầy đủ thông tin bên
                    dưới.</p>
            </div>

            <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
                <form id="donorForm" class="p-8 space-y-6">
                    <input type="hidden" id="donorId" name="id" th:value="${donor?.id}">

                    <div class="bg-slate-100 dark:bg-slate-900 p-1 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center w-auto">
                        <div class="flex-1 items-center">
                            <input checked class="hidden" id="donor_personal" name="donor_type" type="radio"
                                   value="INDIVIDUAL"/>
                            <label for="donor_personal"
                                   class="justify-center p-2 rounded-lg bg-primary text-slate-900 font-bold text-sm flex gap-2 cursor-pointer transition-all">
                                <span class="material-symbols-outlined text-[18px]">person</span>
                                Cá nhân
                            </label>
                        </div>
                        <div class="flex-1">
                            <input class="hidden" id="donor_org" name="donor_type" type="radio" value="ORGANIZATION"/>
                            <label for="donor_org"
                                   class="justify-center p-2 rounded-lg text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 font-medium text-sm flex items-center gap-2 cursor-pointer transition-all">
                                <span class="material-symbols-outlined text-[18px]">business</span>
                                Tổ chức
                            </label>
                        </div>
                    </div>

                    <div id="individual-section" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Họ và tên <span
                                    class="text-red-500">*</span></label>
                            <input id="fullName" name="fullName" type="text" required
                                   class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-primary focus:border-primary px-4 py-2.5"
                                   placeholder="Nhập họ và tên đầy đủ"/>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Tên hiển thị <span
                                    class="text-red-500">*</span></label>
                            <input id="displayName" name="displayName" type="text"
                                   class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-primary focus:border-primary px-4 py-2.5"
                                   placeholder="Tên thường gọi hoặc biệt danh"/>
                        </div>
                    </div>

                    <div id="organization-section" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="flex flex-col gap-2 md:col-span-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Tên tổ chức <span
                                    class="text-red-500">*</span></label>
                            <input id="orgName" name="name" type="text"
                                   class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-primary focus:border-primary px-4 py-2.5"
                                   placeholder="Tên công ty/tổ chức"/>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Mã số thuế <span
                                    class="text-red-500">*</span></label>
                            <input id="taxCode" name="taxCode" type="text"
                                   class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-primary focus:border-primary px-4 py-2.5"
                                   placeholder="0101234567"/>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Người đại diện <span
                                    class="text-red-500">*</span></label>
                            <input id="representative" name="representative" type="text"
                                   class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-primary focus:border-primary px-4 py-2.5"
                                   placeholder="Ông/Bà ..."/>
                        </div>
                        <div class="flex flex-col gap-2 md:col-span-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Địa chỉ xuất hóa
                                đơn</label>
                            <input id="billingAddress" name="billingAddress" type="text"
                                   class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-primary focus:border-primary px-4 py-2.5"
                                   placeholder="Địa chỉ xuất hóa đơn"/>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Số điện thoại <span
                                    class="text-red-500">*</span></label>
                            <input id="phone" name="phone" type="tel" required
                                   class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-primary focus:border-primary px-4 py-2.5"
                                   placeholder="090-xxx-xxxx"/>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Email <span
                                    class="text-red-500">*</span></label>
                            <input id="email" name="email" type="email" required
                                   class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-primary focus:border-primary px-4 py-2.5"
                                   placeholder="example@domain.com"/>
                        </div>
                        <div class="flex flex-col gap-2 md:col-span-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Nguồn giới
                                thiệu</label>
                            <div class="relative">
                                <select id="referralSource" name="referralSource"
                                        class="w-full appearance-none bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-primary focus:border-primary px-4 py-2.5 pr-10">
                                    <option value="">Chọn nguồn giới thiệu</option>
                                    <option value="Facebook">Facebook</option>
                                    <option value="Website">Website</option>
                                    <option value="Friends">Người quen (Friends)</option>
                                    <option value="Other">Khác (Other)</option>
                                </select>
                                <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">expand_more</span>
                            </div>
                        </div>
                        <div class="flex flex-col gap-2 md:col-span-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Ghi chú</label>
                            <textarea id="note" name="note" rows="4"
                                      class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-primary focus:border-primary px-4 py-2.5"
                                      placeholder="Nhập thêm thông tin lưu ý..."></textarea>
                        </div>
                    </div>
                </form>

                <div class="px-8 py-6 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-800 flex justify-end gap-3">
                    <a th:href="@{/admin/donors}"
                       class="px-6 py-2 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        Hủy bỏ
                    </a>
                    <button id="saveDonorBtn" type="button"
                            class="px-8 py-2 rounded-lg bg-primary text-slate-900 font-bold hover:brightness-105 transition-all shadow-md shadow-primary/10">
                        Xác nhận lưu
                    </button>
                </div>
            </div>

            <div class="mt-6 flex items-start gap-3 p-4 bg-primary/10 border border-primary/20 rounded-xl">
                <span class="material-symbols-outlined text-primary">info</span>
                <p class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed">
                    Các trường đánh dấu <span class="text-red-500 font-bold">*</span> là bắt buộc. Hệ thống sẽ sử dụng
                    <b>Số điện thoại</b> để định danh nhà hảo tâm trong các giao dịch tương lai.
                </p>
            </div>
        </div>
    </div>
</div>
<th:block layout:fragment="scripts">
    <script type="module" th:src="@{/js/modules/donor-form.js}"></script>
</th:block>
</body>
</html>
