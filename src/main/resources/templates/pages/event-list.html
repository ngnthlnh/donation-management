<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Danh sách sự kiện')"></head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container">
    <section class="section">
        <h1>Danh sách sự kiện</h1>

        <div th:if="${#lists.isEmpty(events)}">
            <p>Chưa có sự kiện nào.</p>
        </div>

        <div th:each="event : ${events}" class="section" style="margin-top: 20px;">
            <h2 th:text="${event.title}">Tên sự kiện</h2>
            <p th:text="${event.description}">Mô tả sự kiện</p>
            <p><strong>Địa điểm:</strong> <span th:text="${event.location}"></span></p>
            <a class="btn" th:href="@{'/events/' + ${event.id}}">Xem chi tiết</a>
        </div>
    </section>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
