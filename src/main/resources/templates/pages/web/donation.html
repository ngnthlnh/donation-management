<!doctype html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/web/main-layout}"
>
<head>
    <title>Quyên góp</title>
</head>
<body>
<div layout:fragment="content" class="max-w-5xl mx-auto">
    <div class="mb-10">
        <div class="flex items-center justify-center">
            <div class="flex items-center w-full max-w-2xl relative">
                <div class="absolute left-0 top-1/2 transform -translate-y-1/2 w-full h-1 bg-slate-200 dark:bg-slate-800 rounded-full -z-10"></div>
                <div class="absolute left-0 top-1/2 transform -translate-y-1/2 w-1/2 h-1 bg-primary rounded-full -z-10"></div>
                <div class="flex-1 flex flex-col items-center">
                    <div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold shadow-[0_0_0_4px_rgba(17,212,147,0.2)]">
                        1
                    </div>
                    <span class="mt-2 text-sm font-semibold text-primary">Thông tin</span>
                </div>
                <div class="flex-1 flex flex-col items-center opacity-60">
                    <div class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-500 dark:text-slate-400 flex items-center justify-center font-bold">
                        2
                    </div>
                    <span class="mt-2 text-sm font-medium text-slate-500 dark:text-slate-400">Thanh toán</span>
                </div>
            </div>
        </div>
    </div>

    <div class="space-y-6">
        <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800 overflow-hidden">
            <div class="p-6 border-b border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50">
                <h2 class="text-lg font-semibold text-slate-900 dark:text-white flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary">volunteer_activism</span>
                    Thông tin quyên góp
                </h2>
            </div>

            <form id="donationForm" class="p-6 space-y-5">

                <div class="flex bg-slate-100 dark:bg-slate-900 p-1 rounded-lg">
                    <div class="flex-1">
                        <input checked class="hidden" id="donor_personal" name="donor_type" type="radio"
                               value="INDIVIDUAL"/>
                        <label class="block w-full text-center py-2 px-3 text-sm font-medium rounded-md cursor-pointer bg-white transition-all shadow-sm"
                               for="donor_personal">Cá nhân</label>
                    </div>
                    <div class="flex-1">
                        <input class="hidden" id="donor_org" name="donor_type" type="radio" value="ORGANIZATION"/>
                        <label class="block w-full text-center py-2 px-3 text-sm font-medium rounded-md cursor-pointer transition-all border border-transparent"
                               for="donor_org">Tổ chức</label>
                    </div>
                </div>

                <div class="space-y-4 pt-1">
                    <div id="individual-section" class="space-y-3">
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">Họ và tên
                                *</label>
                            <input type="text" name="fullName" required
                                   class="block w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-700 rounded-lg text-sm transition-all focus:border-primary focus:bg-white focus:outline-none dark:focus:border-primary"
                                   placeholder="Nguyễn Văn A">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">Tên hiển
                                thị trên website *</label>
                            <input type="text" name="displayName"
                                   class="block w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-700 rounded-lg text-sm transition-all focus:border-primary focus:bg-white focus:outline-none dark:focus:border-primary"
                                   placeholder="Anh A / Ẩn danh">
                        </div>
                    </div>

                    <div id="organization-section" class="hidden space-y-3">
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">Tên tổ
                                chức *</label>
                            <input type="text" name="name"
                                   class="block w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-700 rounded-lg text-sm transition-all focus:border-primary focus:bg-white focus:outline-none dark:focus:border-primary"
                                   placeholder="Công ty TNHH Hy Vọng">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">Mã số
                                thuế *</label>
                            <input type="text" name="taxCode"
                                   class="block w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-700 rounded-lg text-sm transition-all focus:border-primary focus:bg-white focus:outline-none dark:focus:border-primary"
                                   placeholder="0101234567">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">Người đại
                                diện *</label>
                            <input type="text" name="representative"
                                   class="block w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-700 rounded-lg text-sm transition-all focus:border-primary focus:bg-white focus:outline-none dark:focus:border-primary"
                                   placeholder="Ông Nguyễn Văn B">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">Địa chỉ
                                xuất hóa đơn</label>
                            <input type="text" name="billingAddress"
                                   class="block w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-700 rounded-lg text-sm transition-all focus:border-primary focus:bg-white focus:outline-none dark:focus:border-primary"
                                   placeholder="Số 1, Đường ABC, TP. HCM">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">Số điện
                                thoại *</label>
                            <input type="tel" name="phone" required
                                   class="block w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-700 rounded-lg text-sm transition-all focus:border-primary focus:bg-white focus:outline-none dark:focus:border-primary"
                                   placeholder="0912...">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">Email
                                *</label>
                            <input id="email" type="email" name="email" required
                                   class="block w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-700 rounded-lg text-sm transition-all focus:border-primary focus:bg-white focus:outline-none dark:focus:border-primary"
                                   placeholder="email@gmail.com">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">Lời
                            nhắn</label>
                        <textarea name="note" rows="2"
                                  class="block w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-700 rounded-lg text-sm transition-all focus:border-primary focus:bg-white focus:outline-none dark:focus:border-primary"
                                  placeholder="Lời chúc gửi đến chương trình..."></textarea>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">Bạn biết đến
                            chúng tôi từ đâu?</label>
                        <select name="referralSource"
                                class="block w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-700 rounded-lg text-sm transition-all focus:border-primary focus:bg-white focus:outline-none dark:focus:border-primary">
                            <option value="Facebook">Facebook</option>
                            <option value="Website">Website</option>
                            <option value="Friends">Bạn bè giới thiệu</option>
                            <option value="Other">Khác</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-2 pt-2">
                    <label class="block text-xs font-medium text-slate-500 uppercase">Số tiền ủng hộ</label>
                    <div class="relative">
                        <input name="amount" id="donationAmount" type="number" required
                               class="block w-full pl-4 pr-12 py-3 bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-primary focus:border-primary text-lg font-bold text-primary shadow-sm transition-all"
                               placeholder="Nhập số tiền...">
                        <span class="absolute inset-y-0 right-4 flex items-center text-slate-500 font-bold">VND</span>
                    </div>

                    <div class="flex items-center space-x-2">
                        <input type="checkbox" id="needReceipt" name="needReceipt" class="rounded text-primary">
                        <label for="needReceipt" class="text-sm text-slate-600 dark:text-slate-300">Tôi muốn nhận biên
                            lai xác nhận qua Email</label>
                    </div>

                    <div id="receipt-fields" class="hidden space-y-3 p-4 bg-slate-50 dark:bg-slate-900 rounded-lg">
                        <input type="text" name="receiptName" placeholder="Tên trên biên lai"
                               class="block w-full px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 text-sm">
                        <input type="email" name="receiptEmail" id="receiptEmail" placeholder="Email nhận biên lai"
                               class="block w-full px-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 text-sm">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">Phương thức thanh
                            toán</label>
                        <select name="paymentMethod"
                                class="w-full border-slate-200 dark:border-slate-700 rounded-lg text-sm bg-primary/10 p-3 font-semibold focus:ring-primary focus:border-primary">
                            <option value="BANK_TRANSFER_ONLINE">Chuyển khoản ngân hàng (QR)</option>
                        </select>
                    </div>
                </div>

                <button id="submitDonation" type="button"
                        class="w-full py-3.5 px-4 mt-2 rounded-lg bg-primary hover:bg-blue-700 text-white font-bold shadow-lg flex items-center justify-center gap-2">
                    <span class="material-icons">volunteer_activism</span>
                    Quyên góp ngay
                </button>
            </form>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script>
        function toggleRequired(section, isRequired) {
            const inputs = section.querySelectorAll('input[required], input[data-required]');
            inputs.forEach((input) => {
                if (isRequired) {
                    if (input.dataset.required === "true") input.required = true;
                } else if (input.required) {
                    input.dataset.required = "true";
                    input.required = false;
                }
            });
        }

        function updateDonorTabState(selectedValue) {
            const individualSection = document.getElementById('individual-section');
            const organizationSection = document.getElementById('organization-section');
            const personalLabel = document.querySelector('label[for="donor_personal"]');
            const orgLabel = document.querySelector('label[for="donor_org"]');

            if (selectedValue === 'INDIVIDUAL') {
                individualSection.classList.remove('hidden');
                organizationSection.classList.add('hidden');
                personalLabel.classList.add('bg-white', 'shadow-sm');
                orgLabel.classList.remove('bg-white', 'shadow-sm');
                toggleRequired(individualSection, true);
                toggleRequired(organizationSection, false);
            } else {
                individualSection.classList.add('hidden');
                organizationSection.classList.remove('hidden');
                orgLabel.classList.add('bg-white', 'shadow-sm');
                personalLabel.classList.remove('bg-white', 'shadow-sm');
                toggleRequired(individualSection, false);
                toggleRequired(organizationSection, true);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const donorTypeRadios = document.querySelectorAll('input[name="donor_type"]');
            donorTypeRadios.forEach((radio) => {
                radio.addEventListener('change', (e) => updateDonorTabState(e.target.value));
            });

            const checkedRadio = document.querySelector('input[name="donor_type"]:checked');
            if (checkedRadio) {
                updateDonorTabState(checkedRadio.value);
            }
        });
    </script>
    <script type="module" th:src="@{/js/modules/donation-form.js}"></script>
</th:block>
</body>
</html>
