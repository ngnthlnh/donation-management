<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Liên hệ')"></head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container">
    <section class="page-hero">
        <span class="hero-badge">Liên hệ với chúng tôi</span>
        <h1>Kết nối để cùng tạo ra giá trị tốt đẹp</h1>
        <p>
            Nếu bạn muốn đồng hành, hỗ trợ hoặc tìm hiểu thêm về câu lạc bộ,
            hãy gửi thông tin cho chúng tôi qua biểu mẫu bên dưới.
        </p>
    </section>

    <section class="section contact-layout">
        <div class="contact-info">
            <div class="feature-card">
                <h3>Địa chỉ</h3>
                <p>Đà Nẵng, Việt Nam</p>
            </div>
            <div class="feature-card">
                <h3>Email</h3>
                <p>contact@donationsystem.com</p>
            </div>
            <div class="feature-card">
                <h3>Số điện thoại</h3>
                <p>0123 456 789</p>
            </div>
        </div>

        <div class="contact-form-box">
            <h2 class="section-title small-title">Gửi thông tin liên hệ</h2>
            <form class="contact-form">
                <label>Họ tên</label>
                <input type="text" placeholder="Nhập họ tên">

                <label>Email</label>
                <input type="email" placeholder="Nhập email">

                <label>Số điện thoại</label>
                <input type="text" placeholder="Nhập số điện thoại">

                <label>Nội dung</label>
                <textarea rows="6" placeholder="Nhập nội dung liên hệ"></textarea>

                <button type="submit">Gửi liên hệ</button>
            </form>
        </div>
    </section>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
