<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Danh sách hoạt động')"></head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container">
    <section class="section">
        <h1>Danh sách hoạt động</h1>

        <div th:if="${#lists.isEmpty(activities)}">
            <p>Chưa có hoạt động nào.</p>
        </div>

        <div th:each="activity : ${activities}" class="section" style="margin-top: 20px;">
            <h2 th:text="${activity.title}">Tên hoạt động</h2>
            <p th:text="${activity.description}">Mô tả hoạt động</p>
            <p>
                <strong>Địa điểm:</strong>
                <span th:text="${activity.location}">Địa điểm</span>
            </p>
            <a class="btn" th:href="@{'/activities/' + ${activity.id}}">Xem chi tiết</a>
        </div>
    </section>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
