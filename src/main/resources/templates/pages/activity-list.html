<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Danh sách hoạt động')"></head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container">
    <section class="page-hero">
        <span class="hero-badge">Hoạt động</span>
        <h1>Những hoạt động thiện nguyện nổi bật</h1>
        <p>
            Cập nhật các hoạt động mà câu lạc bộ đang thực hiện để hỗ trợ cộng đồng.
        </p>
    </section>

    <section class="section">
        <h2 class="section-title">Danh sách hoạt động</h2>

        <div th:if="${#lists.isEmpty(activities)}" class="empty-state">
            <h3>Chưa có hoạt động nào</h3>
            <p>Dữ liệu hoạt động sẽ được cập nhật sớm.</p>
        </div>

        <div th:if="${!#lists.isEmpty(activities)}" class="item-grid">
            <div th:each="activity : ${activities}" class="item-card">
                <span class="item-label">Hoạt động</span>
                <h3 th:text="${activity.title}">Tên hoạt động</h3>
                <p th:text="${activity.description}">Mô tả hoạt động</p>
                <p class="item-meta">
                    <strong>Địa điểm:</strong>
                    <span th:text="${activity.location}">Địa điểm</span>
                </p>
                <a class="btn" th:href="@{'/activities/' + ${activity.id}}">Xem chi tiết</a>
            </div>
        </div>
    </section>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
